<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد الصور بالذكاء الاصطناعي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1e, #0c1222);
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #2a2f3f;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge {
            background: #1e293b;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
        }
        .main-card {
            background: rgba(18, 22, 40, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 30px;
            border: 1px solid #2d3348;
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            padding: 16px;
            background: #0f1322;
            border: 1px solid #2d3348;
            border-radius: 24px;
            color: white;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 20px;
        }
        button {
            background: linear-gradient(45deg, #a855f7, #3b82f6);
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .image-card {
            background: #11152a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #2a2f48;
        }
        .image-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #a0a5c0;
        }
        .footer-nav {
            display: flex;
            justify-content: space-around;
            background: #0c1020;
            padding: 16px;
            border-radius: 60px;
            margin-top: 40px;
        }
        .nav-item {
            text-align: center;
            color: #7c82a0;
            cursor: pointer;
        }
        .nav-item.active {
            color: #a855f7;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        .success-msg {
            background: #10b98120;
            border: 1px solid #10b981;
            border-radius: 16px;
            padding: 12px;
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
        }
        .error-msg {
            background: #ef444420;
            border: 1px solid #ef4444;
            border-radius: 16px;
            padding: 12px;
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">🤖 مولد الصور الذكي</div>
        <div class="badge">نسخة آمنة | يعمل بالخادم الوسيط</div>
    </header>

    <div class="main-card">
        <h2 style="margin-bottom: 16px;">🧠 صِفْ ما تريد رسمه</h2>
        <textarea id="promptInput" rows="3" placeholder="مثال: غابة سحرية تحت ضوء القمر، بأسلوب خيالي..."></textarea>
        <div style="display: flex; gap: 12px;">
            <button id="generateBtn">✨ أنشئ الصورة</button>
            <button id="clearBtn" style="background: #2a2f48;">🗑️ مسح المكتبة</button>
        </div>
        <div id="statusMsg"></div>
    </div>

    <div id="resultArea">
        <h3>📚 مكتبة الصور المولدة</h3>
        <div id="imageContainer" class="image-grid"></div>
    </div>

    <div class="footer-nav">
        <div class="nav-item active">🏠 الرئيسية</div>
        <div class="nav-item">🎨 التوليد</div>
        <div class="nav-item">📖 المكتبة</div>
        <div class="nav-item">⚙️ الإعدادات</div>
    </div>
</div>

<script>
    const generateBtn = document.getElementById('generateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const promptInput = document.getElementById('promptInput');
    const imageContainer = document.getElementById('imageContainer');
    const statusMsg = document.getElementById('statusMsg');
    
    // تحميل الصور المخزنة محلياً
    let images = JSON.parse(localStorage.getItem('generated_images') || '[]');
    
    function displayImages() {
        if (images.length === 0) {
            imageContainer.innerHTML = '<div class="loading">📭 لا توجد صور بعد. ابدأ بكتابة وصف وإنشاء أول صورة!</div>';
            return;
        }
        imageContainer.innerHTML = images.map((img, idx) => `
            <div class="image-card">
                <img src="${img.data}" alt="صورة مولدة">
                <div style="padding: 12px; font-size: 12px; color: #a0a5c0;">
                    📝 ${img.prompt.substring(0, 50)}...
                </div>
            </div>
        `).join('');
    }
    
    async function generateImage(prompt) {
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ prompt: prompt + ", high quality, detailed" })
        });
        
        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || `خطأ ${response.status}`);
        }
        
        const data = await response.json();
        
        if (data.success) {
            return data.image;
        } else {
            throw new Error(data.error || 'فشل في توليد الصورة');
        }
    }
    
    generateBtn.addEventListener('click', async () => {
        const prompt = promptInput.value.trim();
        if (!prompt) {
            statusMsg.innerHTML = '<div class="error-msg">⚠️ الرجاء كتابة وصف للصورة أولاً.</div>';
            setTimeout(() => { statusMsg.innerHTML = ''; }, 3000);
            return;
        }
        
        generateBtn.disabled = true;
        generateBtn.innerHTML = '<span class="spinner"></span> جاري التوليد...';
        statusMsg.innerHTML = '<div class="success-msg">⏳ جاري إنشاء صورتك... انتظر قليلاً (10-30 ثانية)</div>';
        
        try {
            const imageData = await generateImage(prompt);
            
            images.unshift({ data: imageData, prompt: prompt, date: new Date().toISOString() });
            if (images.length > 20) images.pop();
            localStorage.setItem('generated_images', JSON.stringify(images));
            displayImages();
            statusMsg.innerHTML = '<div class="success-msg">✅ تم إنشاء الصورة بنجاح!</div>';
            setTimeout(() => { statusMsg.innerHTML = ''; }, 3000);
            promptInput.value = '';
        } catch (error) {
            console.error(error);
            statusMsg.innerHTML = `<div class="error-msg">❌ ${error.message}</div>`;
            setTimeout(() => { statusMsg.innerHTML = ''; }, 5000);
        }
        
        generateBtn.disabled = false;
        generateBtn.innerHTML = '✨ أنشئ الصورة';
    });
    
    clearBtn.addEventListener('click', () => {
        if (confirm("هل تريد مسح جميع الصور المخزنة؟")) {
            images = [];
            localStorage.removeItem('generated_images');
            displayImages();
            statusMsg.innerHTML = '<div class="success-msg">🗑️ تم مسح المكتبة بنجاح</div>';
            setTimeout(() => { statusMsg.innerHTML = ''; }, 2000);
        }
    });
    
    displayImages();
</script>
</body>
</html>
